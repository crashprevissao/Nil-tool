name: Build ESP32 Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache PlatformIO
      uses: actions/cache@v3
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-platformio
    
    - name: Instalar PlatformIO
      run: |
        pip install platformio
        pio upgrade
    
    - name: Compilar firmware
      run: pio run
    
    - name: Organizar arquivos de gravação
      run: |
        mkdir -p esp32_factory_files
        
        # Copia os 3 arquivos gerados pela compilação
        cp .pio/build/esp32dev/firmware.bin esp32_factory_files/
        cp .pio/build/esp32dev/bootloader.bin esp32_factory_files/
        cp .pio/build/esp32dev/partitions.bin esp32_factory_files/
        
        # Procura e copia o boot_app0.bin de forma automática
        find ~/.platformio/packages/framework-arduinoespressif32/ -name "boot_app0.bin" -exec cp {} esp32_factory_files/ \;
        
        # Mostra no log os arquivos reunidos para garantia
        ls -la esp32_factory_files/
    
    - name: Upload dos 4 arquivos de gravação
      uses: actions/upload-artifact@v4
      with:
        name: esp32-binarios-gravacao
        path: esp32_factory_files/
        

name: Build ESP32 Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache PlatformIO
      uses: actions/cache@v3
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-platformio
    
    - name: Instalar PlatformIO
      run: |
        pip install platformio
        pio upgrade
    
    - name: Compilar firmware
      run: pio run
    
    - name: Listar arquivos gerados
      run: ls -la .pio/build/esp32dev/
    
    - name: Upload firmware.bin
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: .pio/build/esp32dev/firmware.bin
    
    - name: Upload bootloader.bin
      uses: actions/upload-artifact@v4
      with:
        name: bootloader
        path: .pio/build/esp32dev/bootloader.bin
    
    - name: Upload partitions.bin
      uses: actions/upload-artifact@v4
      with:
        name: partitions
        path: .pio/build/esp32dev/partitions.bin
    
    - name: Upload boot_app0.bin
      uses: actions/upload-artifact@v4
      with:
        name: boot_app0
        path: ~/.platformio/packages/framework-arduinoespressif32/tools/sdk/esp32/bin/boot_app0.bin
    
    - name: Compactar todos os bins
      run: |
        mkdir -p release
        cp .pio/build/esp32dev/firmware.bin release/
        cp .pio/build/esp32dev/bootloader.bin release/
        cp .pio/build/esp32dev/partitions.bin release/
        cp ~/.platformio/packages/framework-arduinoespressif32/tools/sdk/esp32/bin/boot_app0.bin release/ || echo "boot_app0 não encontrado"
        cd release && zip ../esp32-firmware.zip *.bin
    
    - name: Upload pacote completo
      uses: actions/upload-artifact@v4
      with:
        name: esp32-firmware-completo
        path: esp32-firmware.zip
    
    - name: Release (se tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          .pio/build/esp32dev/firmware.bin
          .pio/build/esp32dev/bootloader.bin
          .pio/build/esp32dev/partitions.bin
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
